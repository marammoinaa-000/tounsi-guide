<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background with gradient effect -->
  <rect width="512" height="512" fill="#C8102E"/>

  <!-- Decorative top border -->
  <rect x="0" y="0" width="512" height="30" fill="#FFFFFF"/>
  <rect x="50" y="30" width="40" height="20" fill="#E8B84B"/>
  <rect x="150" y="30" width="40" height="20" fill="#FFFFFF"/>
  <rect x="250" y="30" width="40" height="20" fill="#E8B84B"/>
  <rect x="350" y="30" width="40" height="20" fill="#FFFFFF"/>
  <rect x="450" y="30" width="40" height="20" fill="#E8B84B"/>

  <!-- Arabesque corner decorations -->
  <path d="M 20 50 L 80 50 L 80 100 L 50 100 L 50 80 L 20 80 Z" fill="#E8B84B"/>
  <path d="M 492 50 L 432 50 L 432 100 L 462 100 L 462 80 L 492 80 Z" fill="#E8B84B"/>

  <!-- Main Logo Circle -->
  <circle cx="256" cy="220" r="120" fill="#FFFFFF"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="220" r="105" fill="none" stroke="#E8B84B" stroke-width="3"/>

  <!-- Crescent Moon and Star -->
  <g transform="translate(256, 210)">
    <!-- Crescent -->
    <path d="M -40 0
             A 55 55 0 1 1 60 0
             A 45 45 0 1 0 -40 0"
          fill="#C8102E"/>

    <!-- Star -->
    <polygon
      points="35,-20 42,-3 60,-3 45,10 50,28 35,18 20,28 25,10 10,-3 28,-3"
      fill="#E8B84B"
      transform="translate(10, -8) scale(0.8)"/>
  </g>

  <!-- Arabic Text -->
  <text x="256" y="370"
        font-family="Arial, sans-serif"
        font-size="56"
        font-weight="bold"
        text-anchor="middle"
        fill="#FFFFFF">تونسي</text>

  <!-- English Text -->
  <text x="256" y="430"
        font-family="Arial, sans-serif"
        font-size="42"
        font-weight="bold"
        text-anchor="middle"
        letter-spacing="6"
        fill="#FFFFFF">GUIDE</text>

  <!-- Bottom decorative pattern -->
  <rect x="80" y="460" width="30" height="30" rx="5" fill="#FFFFFF"/>
  <rect x="130" y="460" width="30" height="30" rx="5" fill="#E8B84B"/>
  <rect x="180" y="460" width="30" height="30" rx="5" fill="#FFFFFF"/>
  <rect x="230" y="460" width="30" height="30" rx="5" fill="#E8B84B"/>
  <rect x="280" y="460" width="30" height="30" rx="5" fill="#FFFFFF"/>
  <rect x="330" y="460" width="30" height="30" rx="5" fill="#E8B84B"/>
  <rect x="380" y="460" width="30" height="30" rx="5" fill="#FFFFFF"/>

  <!-- Decorative dots -->
  <circle cx="120" cy="400" r="5" fill="#E8B84B"/>
  <circle cx="392" cy="400" r="5" fill="#E8B84B"/>

  <!-- Bottom border -->
  <rect x="0" y="502" width="512" height="10" fill="#FFFFFF"/>
</svg>